name: rr-check

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository invariant check
        run: |
          echo "Radiative Rigidity invariant check"

          # Required top-level files
          for f in README.md STATUS.md; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done

          # No build artifacts tracked
          if git ls-files | grep -E '^(\.lake/|build/|dist/)' >/dev/null; then
            echo "Build artifacts detected"
            exit 1
          fi

          echo "OK: repository invariants satisfied"
